<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我 - 张三</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo">张三</a>
        <ul>
          <li><a href="index.html">首页</a></li>
          <li><a href="projects.html">项目作品</a></li>
          <li><a href="docs.html">文档中心</a></li>
          <li><a href="contact.html">联系我</a></li>
        </ul>
        <div class="actions">
          <div class="toggle-switch" id="theme-toggle"></div>
          <a href="admin/login.html" class="btn btn-secondary">管理后台</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>联系我</h1>
    <p class="text-secondary">有任何问题或合作意向，欢迎通过以下方式联系我</p>

    <div class="grid grid-2" style="margin-top: 2rem;">
      <div>
        <h2>联系方式</h2>
        <div id="contact-info" style="margin-top: 1rem;">
          <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
            <i class="fas fa-envelope" style="color: var(--primary-color);"></i>
            <span>zhangsan@example.com</span>
          </div>
        </div>

        <h2>社交媒体</h2>
        <div id="social-links" class="social-links" style="justify-content: flex-start;"></div>
      </div>

      <div>
        <h2>发送消息</h2>
        <form id="contact-form" action="https://formspree.io/f/mayzgzpj" method="POST" style="margin-top: 1rem;">
          <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="message">留言内容</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">发送消息</button>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2024 张三. All rights reserved.</p>
    </div>
  </footer>

  <script type="module">
    import { fetchData, applySavedTheme, toggleTheme, showToast } from './js/utils.js';

    async function loadContactInfo() {
      const profile = await fetchData('data/profile.json');
      if (!profile) return;

      const socialContainer = document.getElementById('social-links');
      profile.social.forEach(social => {
        const link = document.createElement('a');
        link.href = social.url;
        link.target = '_blank';
        link.title = social.name;
        link.innerHTML = `<i class="fab fa-${social.icon}"></i>`;
        socialContainer.appendChild(link);
      });
    }

    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      
      try {
        const response = await fetch('https://formspree.io/f/your-form-id', {
          method: 'POST',
          headers: {
            'Accept': 'application/json'
          },
          body: formData
        });
        
        if (response.ok) {
          showToast('消息发送成功！');
          e.target.reset();
        } else {
          showToast('发送失败，请重试', 'error');
        }
      } catch (error) {
        showToast('发送失败，请检查网络', 'error');
      }
    });

    applySavedTheme();
    loadContactInfo();

    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
  </script>
</body>
</html>
